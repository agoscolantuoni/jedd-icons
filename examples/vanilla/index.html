<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jedd-icons — Vanilla Example</title>
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      padding: 2rem;
      font-family: system-ui, sans-serif;
      color: #0f172a;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }
    h2 {
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      color: #64748b;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    .icon-card {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
      padding: 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
    }
    .icon-card span {
      font-size: 0.75rem;
      color: #64748b;
    }
    hr {
      margin: 2rem 0;
      border: none;
      border-top: 1px solid #e2e8f0;
    }
    p {
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: #64748b;
    }
    </style>
  </head>
  <body>
    <h1>jedd-icons — Vanilla JS</h1>
    <p>Smoke test for the vanilla JavaScript package.</p>

    <h2>createElement</h2>
    <div id="create-element" class="grid"></div>

    <h2>createElement — Fill variant</h2>
    <div id="create-element-fill" class="grid"></div>

    <hr>

    <h2>createIcons (auto-replace)</h2>
    <div class="grid">
      <div class="icon-card">
        <i data-jedd="ChevronRight"></i>
        <span>ChevronRight</span>
      </div>
      <div class="icon-card">
        <i data-jedd="Check"></i>
        <span>Check</span>
      </div>
      <div class="icon-card">
        <i data-jedd="RefreshCw"></i>
        <span>RefreshCw</span>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
